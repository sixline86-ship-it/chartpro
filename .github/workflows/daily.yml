# ============================================================
# .github/workflows/daily.yml   (v2 — 해석글 생성 연결)
# 차트프로 관제탑 — 매일 자동 발행 시간표
# ------------------------------------------------------------
#   ① collect_data.py    숫자 수집 (DART·네이버)
#   ② generate_report.py 해석글 생성 (Claude)
#   ③ build_html.py      리포트 HTML 생성
#   ④ 자동 커밋          → GitHub Pages 자동 배포
# ============================================================

name: 관제탑 일일 발행

on:
  # (1) 수동 실행 버튼 — Actions 탭에서 "Run workflow"
  workflow_dispatch:

  # (2) 자동 실행 시간표 (cron은 UTC 기준! 한국시간 -9시간)
  #     한국 저녁 8시 발행 목표 → 19:30 KST 실행 → UTC 10:30
  #     ⚠️ 수동 버튼으로 몇 번 검증한 뒤, 아래 두 줄의 # 를 지우면 매일 자동 실행됨.
  # schedule:
  #   - cron: '30 10 * * 1-5'   # 월~금 UTC 10:30 = KST 19:30

permissions:
  contents: write

# ⭐ 중요: GitHub 서버는 기본이 UTC(영국 시간)라 한국보다 9시간 느리다.
#    이걸 안 맞추면 밤·새벽 실행 시 "어제 날짜" 파일을 찾아 헤맨다.
#    아래 한 줄로 이 작업 전체가 한국 시간 기준으로 돌아간다.
env:
  TZ: Asia/Seoul

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: 파이썬 준비
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 패키지 설치
        run: pip install -r requirements.txt

      # ── ① 숫자 수집 ──
      - name: 데이터 수집
        env:
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
        run: python collect_data.py

      # ── ② 해석글 생성 ──
      #   continue-on-error: 여기서 실패해도(잔액 부족 등)
      #   리포트는 해석글 없이라도 만들어지도록 다음 단계로 넘어간다.
      - name: 해석글 생성 (Claude)
        continue-on-error: true
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python generate_report.py

      # ── ③ HTML 생성 ──
      - name: 리포트 HTML 생성
        run: |
          python build_html.py
          cp report_$(date +%Y%m%d).html index.html

      # ── ④ 자동 커밋 → Pages 배포 ──
      - name: 자동 커밋 & 배포
        run: |
          git config user.name "chartpro-bot"
          git config user.email "bot@chartpro.local"
          git add index.html data_*.json report_*.json report_*.html || true
          git commit -m "자동 발행: $(date +%Y-%m-%d)" || echo "변경사항 없음"
          git push
